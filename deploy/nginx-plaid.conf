# Insert these blocks into the main server { } in /etc/nginx/sites-enabled/assistant
# (alongside the other MCP routes). Reload with: sudo nginx -t && sudo systemctl reload nginx

location /plaid/mcp {
    auth_request /auth;
    auth_request_set $auth_status $upstream_status;

    proxy_pass http://127.0.0.1:7777/mcp;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # streamable-http / SSE
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}

location = /.well-known/oauth-protected-resource/plaid {
    default_type application/json;
    return 200 '{"resource":"https://assistant-vm.eastus.cloudapp.azure.com/plaid/mcp","authorization_servers":["https://assistant-vm.eastus.cloudapp.azure.com/auth"]}';
}
